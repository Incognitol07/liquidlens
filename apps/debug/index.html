<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>caustics</title>
    <script>
      // Set the theme before first paint so a saved light theme doesn't
      // flash dark; main.ts re-applies it and syncs the toggle icon.
      (() => {
        const stored = localStorage.getItem("caustics-debug-theme");
        document.documentElement.dataset.theme =
          stored === "light" || stored === "dark"
            ? stored
            : matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark";
      })();
    </script>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, sans-serif;
        --bg: #0a0a0e;
        --panel: #111116;
        --border: #1f1f26;
        --border-hover: #2d2d36;
        --border-focus: #43434f;
        --text: #ececf1;
        --text-dim: #9b9ba6;
        --text-faint: #595964;
        --track: #28282f;
        --fill: #d8d8e2;
        --thumb: #fff;
        --hairline: rgba(255, 255, 255, 0.07);
        --menu-hover: rgba(255, 255, 255, 0.07);
        --menu-active: rgba(255, 255, 255, 0.12);
        --swatch-border: rgba(255, 255, 255, 0.08);
        --mono: ui-monospace, "SF Mono", "Cascadia Code", Consolas, monospace;
        --backdrop-image: url("https://picsum.photos/id/1018/960/640");
        --backdrop-text: "caustics";
        --stage-menu-text: #000000;
        --stage-menu-shadow: rgba(255, 255, 255, 0.55);
        --stage-menu-row: rgba(255, 255, 255, 0.28);
        --stage-menu-row-hover: rgba(255, 255, 255, 0.42);
        --stage-menu-row-active: rgba(255, 255, 255, 0.52);
        --stage-menu-hairline: rgba(0, 0, 0, 0.08);
      }

      :root[data-theme="light"] {
        color-scheme: light;
        --bg: #f2f2f6;
        --panel: #ffffff;
        --border: #e4e4ea;
        --border-hover: #c8c8d2;
        --border-focus: #a8a8b4;
        --text: #1a1a21;
        --text-dim: #5c5c68;
        --text-faint: #9b9ba6;
        --track: #dcdce3;
        --fill: #3a3a45;
        --thumb: #1a1a21;
        --hairline: rgba(0, 0, 0, 0.08);
        --menu-hover: rgba(0, 0, 0, 0.05);
        --menu-active: rgba(0, 0, 0, 0.09);
        --swatch-border: rgba(0, 0, 0, 0.12);
      }

      body {
        margin: 0;
        display: grid;
        grid-template-columns: 280px 1fr;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
      }

      /* ----------------------------------------------------------------- */
      /* Mobile panel toggle button                                         */

      #panel-toggle {
        display: none;
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 1001;
        width: 48px;
        height: 48px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        cursor: pointer;
        box-shadow:
          0 4px 16px rgba(0, 0, 0, 0.25),
          0 0 0 1px rgba(255, 255, 255, 0.06) inset;
        transition:
          transform 200ms cubic-bezier(0.34, 1.56, 0.64, 1),
          box-shadow 200ms ease,
          background 150ms ease;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
      }

      #panel-toggle:hover {
        transform: scale(1.08);
        box-shadow:
          0 6px 24px rgba(0, 0, 0, 0.3),
          0 0 0 1px rgba(255, 255, 255, 0.08) inset;
      }

      #panel-toggle:active {
        transform: scale(0.95);
      }

      #panel-toggle svg {
        width: 20px;
        height: 20px;
        display: block;
        margin: auto;
        transition: transform 250ms ease;
      }

      #panel-toggle .icon-close {
        display: none;
      }

      body.panel-open #panel-toggle .icon-sliders {
        display: none;
      }

      body.panel-open #panel-toggle .icon-close {
        display: block;
      }

      /* Scrim overlay behind bottom sheet */
      #panel-scrim {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 999;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(2px);
        -webkit-backdrop-filter: blur(2px);
        opacity: 0;
        transition: opacity 300ms ease;
        pointer-events: none;
      }

      body.panel-open #panel-scrim {
        opacity: 1;
        pointer-events: auto;
      }

      /* ----------------------------------------------------------------- */
      /* Panel                                                              */

      #controls {
        position: sticky;
        top: 0;
        height: 100vh;
        box-sizing: border-box;
        overflow-y: auto;
        background: var(--panel);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        padding: 0 20px 16px;
        scrollbar-width: thin;
        scrollbar-color: var(--track) transparent;
        transition: transform 350ms cubic-bezier(0.32, 0.72, 0, 1);
      }

      #controls::-webkit-scrollbar {
        width: 10px;
      }

      #controls::-webkit-scrollbar-thumb {
        background: var(--track);
        border-radius: 5px;
        border: 3px solid var(--panel);
      }

      #panel-header {
        display: flex;
        align-items: baseline;
        gap: 8px;
        padding: 18px 0 14px;
        border-bottom: 1px solid var(--border);
      }

      #panel-header .wordmark {
        font-family: var(--mono);
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 0.02em;
      }

      #panel-header .tag {
        font-size: 9px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--text-faint);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 2px 7px;
      }

      /* ----------------------------------------------------------------- */
      /* Theme toggle — Transitions.dev icon swap                           */

      #theme-toggle {
        margin-left: auto;
        align-self: center;
        width: 26px;
        height: 26px;
        padding: 0;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text-dim);
        cursor: pointer;
        transition:
          color 120ms ease,
          border-color 120ms ease;
      }

      #theme-toggle:hover {
        color: var(--text);
        border-color: var(--border-hover);
      }

      #theme-toggle:focus-visible {
        outline: 1px solid var(--text-faint);
        outline-offset: 1px;
      }

      #theme-toggle svg {
        width: 14px;
        height: 14px;
        display: block;
      }

      :root {
        --icon-swap-dur: 250ms;
        --icon-swap-blur: 2px;
        --icon-swap-start-scale: 0.25;
        --icon-swap-ease: ease-in-out;
      }

      .t-icon-swap {
        position: relative;
        display: inline-grid;
        place-items: center;
      }

      .t-icon-swap .t-icon {
        grid-area: 1 / 1;
        display: inline-grid;
        place-items: center;
        transition:
          opacity var(--icon-swap-dur) var(--icon-swap-ease),
          filter var(--icon-swap-dur) var(--icon-swap-ease),
          transform var(--icon-swap-dur) var(--icon-swap-ease);
        will-change: opacity, filter, transform;
      }

      .t-icon-swap[data-state="a"] .t-icon[data-icon="a"],
      .t-icon-swap[data-state="b"] .t-icon[data-icon="b"] {
        opacity: 1;
        filter: blur(0);
        transform: scale(1);
      }

      .t-icon-swap[data-state="a"] .t-icon[data-icon="b"],
      .t-icon-swap[data-state="b"] .t-icon[data-icon="a"] {
        opacity: 0;
        filter: blur(var(--icon-swap-blur));
        transform: scale(var(--icon-swap-start-scale));
      }

      @media (prefers-reduced-motion: reduce) {
        .t-icon-swap .t-icon { transition: none !important; }
      }

      .group {
        padding-top: 16px;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .group + .group {
        margin-top: 14px;
        border-top: 1px solid var(--border);
      }

      .group h2 {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--text-faint);
        margin: 0 0 8px;
      }

      /* ----------------------------------------------------------------- */
      /* Control rows: name | input | value, all on one line               */

      .control {
        display: grid;
        grid-template-columns: 86px 1fr 48px;
        align-items: center;
        gap: 10px;
        min-height: 26px;
        border-radius: 6px;
      }

      .control-name {
        font-size: 11.5px;
        color: var(--text-dim);
        white-space: nowrap;
        transition: color 120ms ease;
      }

      .control:hover .control-name {
        color: var(--text);
      }

      .control-value {
        font-family: var(--mono);
        font-size: 11px;
        font-variant-numeric: tabular-nums;
        color: var(--text);
        text-align: right;
        white-space: nowrap;
      }

      .control-wide {
        grid-column: 2 / -1;
      }

      /* ----------------------------------------------------------------- */
      /* Sliders                                                            */

      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 16px;
        margin: 0;
        background: transparent;
        cursor: pointer;
      }

      input[type="range"]:focus-visible {
        outline: none;
      }

      input[type="range"]::-webkit-slider-runnable-track {
        height: 2px;
        border-radius: 1px;
        background: linear-gradient(
          to right,
          var(--fill) var(--p, 50%),
          var(--track) var(--p, 50%)
        );
      }

      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 10px;
        height: 10px;
        margin-top: -4px;
        border-radius: 50%;
        background: var(--thumb);
        box-shadow: 0 0 0 3px var(--panel);
        transition: transform 120ms ease;
      }

      input[type="range"]:hover::-webkit-slider-thumb,
      input[type="range"]:active::-webkit-slider-thumb {
        transform: scale(1.25);
      }

      input[type="range"]:focus-visible::-webkit-slider-thumb {
        box-shadow:
          0 0 0 3px var(--panel),
          0 0 0 5px var(--text-faint);
      }

      input[type="range"]::-moz-range-track {
        height: 2px;
        border-radius: 1px;
        background: var(--track);
      }

      input[type="range"]::-moz-range-progress {
        height: 2px;
        border-radius: 1px;
        background: var(--fill);
      }

      input[type="range"]::-moz-range-thumb {
        width: 10px;
        height: 10px;
        border: none;
        border-radius: 50%;
        background: var(--thumb);
        box-shadow: 0 0 0 3px var(--panel);
        transition: transform 120ms ease;
      }

      input[type="range"]:hover::-moz-range-thumb,
      input[type="range"]:active::-moz-range-thumb {
        transform: scale(1.25);
      }

      input[type="range"]:focus-visible::-moz-range-thumb {
        box-shadow:
          0 0 0 3px var(--panel),
          0 0 0 5px var(--text-faint);
      }

      /* ----------------------------------------------------------------- */
      /* Preset buttons                                                     */

      .presets {
        display: flex;
        gap: 4px;
      }

      .preset-btn {
        flex: 1;
        height: 22px;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text-dim);
        font-family: inherit;
        font-size: 10.5px;
        cursor: pointer;
        transition:
          color 120ms ease,
          border-color 120ms ease,
          background 120ms ease;
      }

      .preset-btn:hover {
        color: var(--text);
        border-color: var(--border-hover);
      }

      .preset-btn:focus-visible {
        outline: 1px solid var(--text-faint);
        outline-offset: 1px;
      }

      .preset-btn.is-active {
        color: var(--text);
        border-color: var(--text-faint);
        background: var(--bg);
      }

      /* ----------------------------------------------------------------- */
      /* Text input + backdrop swatches                                     */

      input[type="text"] {
        box-sizing: border-box;
        width: 100%;
        background: var(--bg);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 5px 8px;
        font-family: var(--mono);
        font-size: 11.5px;
        transition: border-color 120ms ease;
      }

      input[type="text"]:hover {
        border-color: var(--border-hover);
      }

      input[type="text"]:focus-visible {
        outline: none;
        border-color: var(--border-focus);
      }

      .swatches {
        display: flex;
        gap: 6px;
      }

      .swatch {
        flex: 1;
        height: 26px;
        padding: 0;
        border: 1px solid var(--swatch-border);
        border-radius: 5px;
        background-size: cover;
        background-position: center;
        cursor: pointer;
        opacity: 0.65;
        transition:
          opacity 120ms ease,
          box-shadow 120ms ease;
      }

      .swatch:hover {
        opacity: 1;
      }

      .swatch:focus-visible {
        outline: none;
      }

      .swatch.is-active {
        opacity: 1;
        box-shadow:
          0 0 0 2px var(--panel),
          0 0 0 3.5px var(--text-dim);
      }

      .swatch[data-image="stripes"] {
        background-image: repeating-linear-gradient(45deg, #ff5f6d 0 6px, #ffc371 6px 12px);
      }

      .swatch[data-image="river"] {
        background-image: url("https://picsum.photos/id/1015/96/64");
      }

      .swatch[data-image="canyon"] {
        background-image: url("https://picsum.photos/id/1016/96/64");
      }

      .swatch[data-image="mountains"] {
        background-image: url("https://picsum.photos/id/1018/96/64");
      }

      .swatch[data-image="pug"] {
        background-image: url("https://picsum.photos/id/1025/96/64");
      }

     

      /* ----------------------------------------------------------------- */
      /* Stage                                                              */

      #stage {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 40px;
        padding: 32px;
        background: var(--bg);
        min-width: 0;
      }

      .backdrop {
        width: 480px;
        max-width: 100%;
        height: 320px;
        background-image: var(--backdrop-image);
        background-size: cover;
        background-position: center;
        aspect-ratio: 3 / 2;
      }

      .backdrop::after {
        content: var(--backdrop-text);
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 64px;
        font-weight: 800;
        color: rgba(255, 255, 255, 0.9);
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.45);
        letter-spacing: 0.05em;
        pointer-events: none;
      }

      .background {
        position: relative;
        border-radius: 12px;
        overflow: hidden;
      }

      /* The lens frame. Everything inside it (refraction copy, shine) is
         injected and managed by createLiquidLens from caustics. */
      .lens {
        position: absolute;
        top: 0;
        left: 0;
        /* Paint above .background::after so its undistorted text cannot
           show through; the lens carries its own (distorted) copy. */
        z-index: 1;
        cursor: grab;
        touch-action: none;
        box-shadow:
          0 4px 10px rgba(0, 0, 0, 0.25),
          0 10px 30px rgba(0, 0, 0, 0.2);
      }

      #previews {
        display: flex;
        gap: 24px;
        align-items: flex-start;
        flex-wrap: wrap;
        justify-content: center;
        max-width: 100%;
        box-sizing: border-box;
      }

      #previews > div {
        min-width: 0;
        max-width: 100%;
        flex-shrink: 1;
      }

      #previews canvas {
        display: block;
        image-rendering: pixelated;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--panel);
        max-width: 100%;
        height: auto;
      }

      #previews #specular-preview {
        border-color: #1f1f26;
        background: #111116;
      }

      #specular-preview + .map-label {
        color: #595964;
      }

      .map-label {
        font-family: var(--mono);
        font-size: 10.5px;
        color: var(--text-faint);
        margin-top: 8px;
        text-align: center;
      }

      /* ----------------------------------------------------------------- */
      /* Morphing Liquid Menu                                               */

      #liquid-menu-wrapper {
        position: absolute;
        top: 16px;
        right: 16px;
        z-index: 2;
        display: flex;
        justify-content: flex-end;
        /* Pin the menu's top edge so the morph unfurls downward from the
           control, like a menu emerging from its anchor, instead of
           inflating symmetrically around its center. */
        align-items: flex-start;
        width: 172px;
        height: 96px;
        pointer-events: none;
      }

      #liquid-menu {
        position: relative;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        /* Press squish scales from the pinned top edge, matching the
           morph's anchor. */
        transform-origin: 50% 0;
        background: transparent;
        border: 0;
        box-shadow:
          0 8px 24px rgba(0, 0, 0, 0.22),
          0 0 0 1px rgba(255, 255, 255, 0.08) inset;
        user-select: none;
        overflow: hidden;
        transition: border-color 120ms ease;
        pointer-events: auto;
      }

      #liquid-menu.is-expanded {
        cursor: default;
      }

      /* Both content layers are pinned to their own end-state geometry
         (heights match MENU_COLLAPSED / MENU_EXPANDED in main.ts), so the
         morphing frame reveals them through its overflow clip instead of
         reflowing them every frame. Opacity and transform are driven from
         the morph springs in main.ts — no CSS transitions here, or the
         content would run on its own clock while the frame wobbles. */
      .menu-trigger,
      .menu-expanded-content {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2;
        will-change: opacity, transform;
      }

      .menu-trigger {
        height: 36px;
        padding: 0;
        background: var(--stage-menu-row);
        border: 0;
        cursor: pointer;
        font-family: inherit;
        font-size: 0;
        font-weight: 600;
        color: var(--stage-menu-text);
        letter-spacing: 0.08em;
        text-shadow: 0 1px 2px var(--stage-menu-shadow);
        text-transform: uppercase;
      }

      .menu-trigger:focus-visible,
      .menu-opt-btn:focus-visible {
        outline: 2px solid currentColor;
        outline-offset: -4px;
      }

      #liquid-menu:hover .menu-trigger {
        background: var(--stage-menu-row-hover);
      }

      .menu-trigger .menu-icon {
        width: 18px;
        height: 18px;
        color: currentColor;
        transition: color 120ms ease;
      }

      /* Apple-menu layout: rows run edge to edge with a hairline between
         them; the frame's radius and overflow clip do the rounding. */
      .menu-expanded-content {
        height: 80px;
        flex-direction: column;
        gap: 0;
        padding: 0;
        box-sizing: border-box;
        opacity: 0;
        pointer-events: none;
      }

      #liquid-menu.is-expanded .menu-trigger {
        pointer-events: none;
      }

      #liquid-menu.is-expanded .menu-expanded-content {
        pointer-events: auto;
      }

      .menu-opt-btn {
        width: 100%;
        flex: 1;
        background: var(--stage-menu-row);
        border: none;
        color: var(--stage-menu-text);
        font-family: inherit;
        font-size: 11.5px;
        font-weight: 500;
        letter-spacing: 0.01em;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 0 14px;
        cursor: pointer;
        text-shadow: 0 1px 2px var(--stage-menu-shadow);
        transition:
          background 80ms ease,
          color 80ms ease;
      }

      .menu-opt-btn + .menu-opt-btn {
        border-top: 1px solid var(--stage-menu-hairline);
      }

      .menu-opt-btn:hover {
        background: var(--stage-menu-row-hover);
      }

      .menu-opt-btn:active {
        background: var(--stage-menu-row-active);
      }

      .menu-opt-btn .opt-icon {
        flex-shrink: 0;
        width: 14px;
        height: 14px;
        flex-shrink: 0;
        color: currentColor;
        transition: color 120ms ease;
      }
      /* ----------------------------------------------------------------- */
      /* Responsive: Tablet                                                 */

      @media (max-width: 1024px) and (min-width: 769px) {
        body {
          grid-template-columns: 250px 1fr;
        }

        #controls {
          padding: 0 16px 16px;
        }

        .control {
          grid-template-columns: 76px 1fr 42px;
          gap: 8px;
        }

        .backdrop {
          width: min(420px, calc(100% - 32px));
          height: auto;
        }

        #stage {
          padding: 24px;
          gap: 28px;
        }

        #previews {
          gap: 16px;
          padding: 0 16px;
          box-sizing: border-box;
        }

        #previews > div {
          max-width: calc(50% - 8px);
        }
      }

      /* ----------------------------------------------------------------- */
      /* Responsive: Mobile                                                  */

      @media (max-width: 768px) {
        body {
          display: flex;
          flex-direction: column;
          grid-template-columns: none;
        }

        #panel-toggle {
          display: flex;
          align-items: center;
          justify-content: center;
        }

        #panel-scrim {
          display: block;
        }

        #controls {
          position: fixed;
          bottom: 0;
          left: 0;
          right: 0;
          top: auto;
          height: auto;
          max-height: 70vh;
          z-index: 1000;
          border-right: none;
          border-top: 1px solid var(--border);
          border-radius: 20px 20px 0 0;
          padding: 0 20px 80px;
          box-shadow:
            0 -8px 32px rgba(0, 0, 0, 0.25),
            0 0 0 1px rgba(255, 255, 255, 0.04) inset;
          transform: translateY(100%);
          overflow-y: auto;
          overscroll-behavior: contain;
          -webkit-overflow-scrolling: touch;
        }

        body.panel-open #controls {
          transform: translateY(0);
        }

        /* Drag handle indicator */
        #controls::before {
          content: "";
          display: block;
          width: 36px;
          height: 4px;
          border-radius: 2px;
          background: var(--track);
          margin: 12px auto 4px;
          flex-shrink: 0;
        }

        #panel-header {
          position: sticky;
          top: 0;
          z-index: 1;
          background: var(--panel);
          padding: 14px 0 12px;
        }

        .control {
          grid-template-columns: 72px 1fr 42px;
          gap: 8px;
          min-height: 32px;
        }

        .control-name {
          font-size: 12px;
        }

        input[type="range"] {
          height: 28px;
        }

        input[type="range"]::-webkit-slider-thumb {
          width: 16px;
          height: 16px;
          margin-top: -7px;
        }

        input[type="range"]::-moz-range-thumb {
          width: 16px;
          height: 16px;
        }

        .preset-btn {
          height: 28px;
          font-size: 11.5px;
        }

        .swatch {
          height: 32px;
        }

        input[type="text"] {
          padding: 7px 10px;
          font-size: 13px;
        }

        #stage {
          padding: 20px 16px;
          gap: 24px;
          min-height: 100vh;
          /* Ensure enough room for the floating toggle button */
          padding-bottom: 80px;
        }

        .backdrop {
          width: calc(100% - 16px);
          height: auto;
          max-width: 480px;
        }

        .backdrop::after {
          font-size: clamp(28px, 10vw, 64px);
        }

        #previews {
          gap: 12px;
          padding: 0 8px;
          width: 100%;
          box-sizing: border-box;
        }

        #previews > div {
          flex: 1 1 calc(50% - 6px);
          min-width: 100px;
          max-width: 100%;
        }

        #previews canvas {
          width: 100% !important;
          max-width: 100%;
          height: auto !important;
        }

        .map-label {
          font-size: 9px;
          margin-top: 6px;
          word-break: break-word;
        }

        #liquid-menu-wrapper {
          top: 12px;
          right: 12px;
        }
      }

      /* ----------------------------------------------------------------- */
      /* Responsive: Small Mobile                                            */

      @media (max-width: 400px) {
        #controls {
          padding: 0 14px 80px;
        }

        .control {
          grid-template-columns: 64px 1fr 38px;
          gap: 6px;
        }

        .control-name {
          font-size: 11px;
        }

        .control-value {
          font-size: 10px;
        }

        .group h2 {
          font-size: 9.5px;
        }

        #stage {
          padding: 14px 10px 80px;
        }

        .backdrop::after {
          font-size: clamp(22px, 9vw, 48px);
        }

        #previews {
          flex-direction: column;
          align-items: center;
          gap: 10px;
        }

        #previews > div {
          max-width: 90%;
          width: 100%;
        }

        .map-label {
          font-size: 8.5px;
        }
      }
    </style>
  </head>
  <body>
    <!-- Mobile panel toggle -->
    <button id="panel-toggle" aria-label="Toggle controls panel" title="Toggle controls">
      <svg class="icon-sliders" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="4" y1="21" x2="4" y2="14"/>
        <line x1="4" y1="10" x2="4" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="12"/>
        <line x1="12" y1="8" x2="12" y2="3"/>
        <line x1="20" y1="21" x2="20" y2="16"/>
        <line x1="20" y1="12" x2="20" y2="3"/>
        <line x1="1" y1="14" x2="7" y2="14"/>
        <line x1="9" y1="8" x2="15" y2="8"/>
        <line x1="17" y1="16" x2="23" y2="16"/>
      </svg>
      <svg class="icon-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
    <div id="panel-scrim"></div>
    <div id="controls">
      <header id="panel-header">
        <span class="wordmark">caustics</span>
        <span class="tag">debug</span>
        <span class="tag" id="reduced-motion-tag" hidden title="The OS asks for reduced motion; springs snap and press swell is off">reduced motion</span>
        <button id="theme-toggle" class="t-icon-swap" data-state="a" aria-label="Switch to light mode" title="Toggle theme">
          <span class="t-icon" data-icon="a" aria-hidden="true">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M13.5 9.5A6 6 0 0 1 6.5 2.5a6 6 0 1 0 7 7z"/>
            </svg>
          </span>
          <span class="t-icon" data-icon="b" aria-hidden="true">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="8" cy="8" r="3"/>
              <path d="M8 1.5v1.5M8 13v1.5M1.5 8H3M13 8h1.5M3.4 3.4l1.06 1.06M11.54 11.54l1.06 1.06M3.4 12.6l1.06-1.06M11.54 4.46l1.06-1.06"/>
            </svg>
          </span>
        </button>
      </header>

      <section class="group">
        <h2>Geometry</h2>
        <div class="control">
          <label class="control-name" for="width">width</label>
          <input id="width" type="range" min="40" max="480" step="1" value="123" />
          <output class="control-value" id="width-value"></output>
        </div>
        <div class="control">
          <label class="control-name" for="height">height</label>
          <input id="height" type="range" min="40" max="320" step="1" value="118" />
          <output class="control-value" id="height-value"></output>
        </div>
        <div class="control">
          <label class="control-name" for="borderRadius">radius</label>
          <input id="borderRadius" type="range" min="0" max="160" step="1" value="60" />
          <output class="control-value" id="borderRadius-value"></output>
        </div>
      </section>

      <section class="group">
        <h2>Optics</h2>
        <div class="control">
          <span class="control-name">preset</span>
          <div class="presets control-wide" role="radiogroup" aria-label="Effect preset">
            <button class="preset-btn" data-preset="full" title="Everything on: aberration, blur, saturation, specular">full</button>
            <button class="preset-btn" data-preset="lean" title="No aberration or blur — the cheap filter chain">lean</button>
            <button class="preset-btn" data-preset="minimal" title="Refraction only — single displacement pass">minimal</button>
          </div>
        </div>
        <div class="control">
          <label class="control-name" for="depth">depth</label>
          <input id="depth" type="range" min="0" max="60" step="1" value="24" />
          <output class="control-value" id="depth-value"></output>
        </div>
        <div class="control">
          <label class="control-name" for="curvature">curvature</label>
          <input id="curvature" type="range" min="0" max="1" step="0.01" value="0.4" />
          <output class="control-value" id="curvature-value"></output>
        </div>
        <div class="control">
          <label class="control-name" for="splay">splay</label>
          <input id="splay" type="range" min="0" max="1" step="0.01" value="0.59" />
          <output class="control-value" id="splay-value"></output>
        </div>
        <div class="control">
          <label class="control-name" for="aberration">aberration</label>
          <input id="aberration" type="range" min="0" max="0.5" step="0.01" value="0.05" />
          <output class="control-value" id="aberration-value"></output>
        </div>
        <div class="control">
          <label class="control-name" for="blur">blur</label>
          <input id="blur" type="range" min="0" max="4" step="0.1" value="0.2" />
          <output class="control-value" id="blur-value"></output>
        </div>
        <div class="control">
          <label class="control-name" for="saturation">saturation</label>
          <input id="saturation" type="range" min="0.5" max="2" step="0.05" value="1.15" />
          <output class="control-value" id="saturation-value"></output>
        </div>
      </section>

      <section class="group">
        <h2>Light</h2>
        <div class="control">
          <label class="control-name" for="lightAngle">angle</label>
          <input id="lightAngle" type="range" min="-180" max="180" step="1" value="0" />
          <output class="control-value" id="lightAngle-value"></output>
        </div>
        <div class="control">
          <label class="control-name" for="specular">specular</label>
          <input id="specular" type="range" min="0" max="1" step="0.05" value="1" />
          <output class="control-value" id="specular-value"></output>
        </div>
      </section>

      <section class="group">
        <h2>Backdrop</h2>
        <div class="control">
          <span class="control-name">image</span>
          <div class="swatches control-wide" role="radiogroup" aria-label="Backdrop image">
            <button class="swatch is-active" data-image="mountains" title="mountains" aria-label="mountains"></button>
            <button class="swatch" data-image="stripes" title="stripes" aria-label="stripes"></button>
            <button class="swatch" data-image="river" title="mountain river" aria-label="mountain river"></button>
            <button class="swatch" data-image="canyon" title="canyon" aria-label="canyon"></button>
            <button class="swatch" data-image="pug" title="pug" aria-label="pug"></button>
          </div>
        </div>
        <div class="control">
          <label class="control-name" for="backdrop-text">text</label>
          <input class="control-wide" id="backdrop-text" type="text" value="caustics" />
        </div>
      </section>

    </div>

    <div id="stage">
      <div class="backdrop background" id="background">
        <div class="lens" id="lens"></div>
        <div id="liquid-menu-wrapper">
          <div id="liquid-menu" class="menu-lens">
            <button class="menu-trigger" id="liquid-menu-trigger" type="button" aria-label="Quick actions" aria-haspopup="menu" aria-expanded="false">
              <svg class="menu-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 4.5h10"/>
                <path d="M3 8h10"/>
                <path d="M3 11.5h10"/>
              </svg>
            </button>
            <div class="menu-expanded-content" role="menu" aria-label="Quick actions">
              <button class="menu-opt-btn" id="opt-reset" role="menuitem">
                <span>Reset All</span>
                <svg class="opt-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M2.5 2.5v4h4"/>
                  <path d="M2.84 10a5.5 5.5 0 1 0 .94-5.72L2.5 6.5"/>
                </svg>
              </button>
              <button class="menu-opt-btn" id="opt-randomize" role="menuitem">
                <span>Randomize</span>
                <svg class="opt-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M2 4h3.5l5 8H14"/>
                  <path d="M2 12h3.5l2-3.2"/>
                  <path d="M9.5 4H14"/>
                  <polyline points="12 2 14 4 12 6"/>
                  <polyline points="12 10 14 12 12 14"/>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>

      <div id="previews">
        <div>
          <canvas id="map-preview"></canvas>
          <div class="map-label">displacement (R = dx, G = dy, 128 = neutral)</div>
        </div>
        <div>
          <canvas id="specular-preview"></canvas>
          <div class="map-label">specular (alpha = highlight)</div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
