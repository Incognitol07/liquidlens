<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>glasskit</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, sans-serif;
        --backdrop-image:
          repeating-linear-gradient(45deg, #ff5f6d 0 20px, #ffc371 20px 40px),
          repeating-linear-gradient(-45deg, transparent 0 10px, rgba(0, 0, 0, 0.15) 10px 20px);
        --backdrop-text: "glasskit";
      }

      body {
        margin: 0;
        display: grid;
        grid-template-columns: 280px 1fr;
        min-height: 100vh;
        background: #0e0e12;
        color: #eee;
      }

      h1 {
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #888;
        margin: 0 0 16px;
      }

      #controls {
        padding: 24px;
        border-right: 1px solid #222;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .control label {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        margin-bottom: 4px;
      }

      .control input[type="range"] {
        width: 100%;
      }

      .control select,
      .control input[type="text"] {
        width: 100%;
        box-sizing: border-box;
        background: #1a1a1f;
        color: #eee;
        border: 1px solid #333;
        border-radius: 6px;
        padding: 6px 8px;
        font: inherit;
        font-size: 13px;
      }

      #stage {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 32px;
        padding: 32px;
      }

      .backdrop {
        width: 480px;
        height: 320px;
        background-image: var(--backdrop-image);
        background-size: cover;
        background-position: center;
      }

      .backdrop::after {
        content: var(--backdrop-text);
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 64px;
        font-weight: 800;
        color: rgba(255, 255, 255, 0.9);
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.45);
        letter-spacing: 0.05em;
        pointer-events: none;
      }

      .background {
        position: relative;
        border-radius: 12px;
        overflow: hidden;
      }

      /* The lens frame. Everything inside it (refraction copy, shine) is
         injected and managed by createLiquidLens from @glasskit/core. */
      .lens {
        position: absolute;
        top: 0;
        left: 0;
        /* Paint above .background::after so its undistorted text cannot
           show through; the lens carries its own (distorted) copy. */
        z-index: 1;
        cursor: grab;
        touch-action: none;
        box-shadow:
          0 4px 10px rgba(0, 0, 0, 0.25),
          0 10px 30px rgba(0, 0, 0, 0.2);
      }

      #map-preview {
        image-rendering: pixelated;
        border: 1px solid #333;
        background: #1a1a1f;
      }

      .map-label {
        font-size: 12px;
        color: #888;
        margin-top: 8px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="controls">
      <h1>Lens Params</h1>
      <div class="control">
        <label for="width"><span>width</span><span id="width-value"></span></label>
        <input id="width" type="range" min="40" max="480" step="1" value="123" />
      </div>
      <div class="control">
        <label for="height"><span>height</span><span id="height-value"></span></label>
        <input id="height" type="range" min="40" max="320" step="1" value="118" />
      </div>
      <div class="control">
        <label for="borderRadius"><span>borderRadius</span><span id="borderRadius-value"></span></label>
        <input id="borderRadius" type="range" min="0" max="160" step="1" value="60" />
      </div>
      <div class="control">
        <label for="depth"><span>depth</span><span id="depth-value"></span></label>
        <input id="depth" type="range" min="0" max="60" step="1" value="24" />
      </div>
      <div class="control">
        <label for="curvature"><span>curvature</span><span id="curvature-value"></span></label>
        <input id="curvature" type="range" min="0" max="1" step="0.01" value="0.4" />
      </div>
      <div class="control">
        <label for="splay"><span>splay</span><span id="splay-value"></span></label>
        <input id="splay" type="range" min="0" max="1" step="0.01" value="0.59" />
      </div>
      <div class="control">
        <label for="aberration"><span>aberration</span><span id="aberration-value"></span></label>
        <input id="aberration" type="range" min="0" max="0.5" step="0.01" value="0.05" />
      </div>
      <div class="control">
        <label for="blur"><span>blur</span><span id="blur-value"></span></label>
        <input id="blur" type="range" min="0" max="4" step="0.1" value="0.2" />
      </div>
      <div class="control">
        <label for="saturation"><span>saturation</span><span id="saturation-value"></span></label>
        <input id="saturation" type="range" min="0.5" max="2" step="0.05" value="1.15" />
      </div>
      <div class="control">
        <label for="lightAngle"><span>lightAngle</span><span id="lightAngle-value"></span></label>
        <input id="lightAngle" type="range" min="-180" max="180" step="1" value="0" />
      </div>
      <div class="control">
        <label for="specular"><span>specular</span><span id="specular-value"></span></label>
        <input id="specular" type="range" min="0" max="1" step="0.05" value="1" />
      </div>

      <h1>Backdrop</h1>
      <div class="control">
        <label for="backdrop-image"><span>image</span></label>
        <select id="backdrop-image">
          <option value="stripes">stripes</option>
          <option value="river">mountain river</option>
          <option value="canyon">canyon</option>
          <option value="mountains">mountains</option>
          <option value="pug">pug</option>
        </select>
      </div>
      <div class="control">
        <label for="backdrop-text"><span>text</span></label>
        <input id="backdrop-text" type="text" value="glasskit" />
      </div>
    </div>

    <div id="stage">
      <div class="backdrop background" id="background">
        <div class="lens" id="lens"></div>
      </div>

      <div style="display: flex; gap: 24px; align-items: flex-start">
        <div>
          <canvas id="map-preview"></canvas>
          <div class="map-label">displacement map (R = dx, G = dy, neutral = 128)</div>
        </div>
        <div>
          <canvas id="specular-preview"></canvas>
          <div class="map-label">specular map (alpha = highlight)</div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
